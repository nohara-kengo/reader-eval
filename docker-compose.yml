# ローカル開発用 Docker Compose（Issue #2）
# 本番デプロイは Coolify + Cloudflare Tunnel（Issue #7）。ここは開発専用。
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    # ソースを bind mount し、node_modules はコンテナ内のものを使う（anonymous volume で上書き）
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      NODE_ENV: development
      DATABASE_URL: "postgresql://${POSTGRES_USER:-dev}:${POSTGRES_PASSWORD:-dev}@db:5432/${POSTGRES_DB:-reader_eval}"
      AUTH_SECRET: "${AUTH_SECRET:-}"
      AZURE_AD_TENANT_ID: "${AZURE_AD_TENANT_ID:-}"
      AZURE_AD_CLIENT_ID: "${AZURE_AD_CLIENT_ID:-}"
      AZURE_AD_CLIENT_SECRET: "${AZURE_AD_CLIENT_SECRET:-}"
      APP_BASE_URL: "${APP_BASE_URL:-http://localhost:3000}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-reader_eval}"
      POSTGRES_USER: "${POSTGRES_USER:-dev}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-dev}"
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dev} -d ${POSTGRES_DB:-reader_eval}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # 任意ツール: docker compose --profile tools up -d
  adminer:
    image: adminer:latest
    profiles: ["tools"]
    ports:
      - "8080:8080"
    depends_on:
      - db

  mailhog:
    image: mailhog/mailhog:latest
    profiles: ["tools"]
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  db_data:
