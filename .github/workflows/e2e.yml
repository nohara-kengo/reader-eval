name: E2E

# コスト最適化（testing.md §7）: main 宛て PR（develop→main リリース）と nightly のみ実行。
# 通常の feature→develop PR では実行しない。
on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 18 * * *" # 03:00 JST 相当
  workflow_dispatch:

jobs:
  e2e:
    name: Playwright (Chromium)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - name: Start app
        run: npm run start &
      - name: Wait for app
        run: timeout 90 bash -c 'until curl -sf http://localhost:3000/api/health; do sleep 2; done'
      - run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
